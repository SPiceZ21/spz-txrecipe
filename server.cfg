# ── Server Endpoints ──────────────────────────────────────────────────
{{serverEndpoints}}

# ── Server Identification ─────────────────────────────────────────────
sv_hostname "{{serverName}}"
sets tags "racing, spicez, spz, c-pro"
sets locale "root-AQ" 

# ── UI/UX ─────────────────────────────────────────────────────────────
load_server_icon Logo.png
sets banner_detail "Banner.png"
sets banner_connecting "Banner.png"
sv_maxclients {{maxClients}}

# ── Game Build ────────────────────────────────────────────────────────
# 3407 = Latest Stable Build (All modern vehicles and assets available)
sv_enforceGameBuild 3095 
set resources_useSystemChat true

# ── License & Database ────────────────────────────────────────────────
sv_licenseKey "{{svLicenseKey}}"
set mysql_connection_string "{{dbConnectionString}}"

# ── SPiceZ Convars ────────────────────────────────────────────────────
set spz_debug "{{spzDebug}}"

# ── Voice Configuration ───────────────────────────────────────────────
setr voice_useNativeAudio true
setr voice_useSendingRangeOnly true
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3
setr voice_enableRadioAnim 1
setr voice_syncData 1

# ── Default CFX (minimal) ─────────────────────────────────────────
ensure mapmanager
ensure chat
# spawnmanager and basic-gamemode removed — spz-core handles spawning
ensure sessionmanager
ensure hardcap
ensure baseevents

# ── Dependencies ──────────────────────────────────────────────────
ensure oxmysql
ensure ox_lib
ensure pma-voice
ensure screenshot-basic

# ── SPiceZ Core ───────────────────────────────────────────────────
ensure spz-lib
ensure spz-core

# ── Identity & Player data ────────────────────────────────────────
ensure spz-identity
ensure spz-appearance

# ── Vehicles & Races ─────────────────────────────────────────────
ensure spz-vehicles
ensure spz-physics
ensure spz-races
ensure spz-progression
ensure spz-leaderboard

# ── UI ────────────────────────────────────────────────────────────
ensure spz-hud
ensure spz-menu

# ── Admin (always last) ───────────────────────────────────────────

# ── Permissions ───────────────────────────────────────────────────────
add_ace group.admin command allow # allow all commands
add_ace group.admin spz.admin allow
add_ace group.admin spz.moderator allow
add_ace group.admin spz.spectate allow
add_ace group.admin spz.dev allow
{{addPrincipalsMaster}}

# ── Inheritance ───────────────────────────────────────────────────────
# Custom inheritance patterns for SPiceZ Racing
add_principal qbcore.god group.admin 
