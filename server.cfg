# ── Server Endpoints ──────────────────────────────────────────────────────
{{serverEndpoints}}

# ── License & Database ────────────────────────────────────────────────────
sv_licenseKey "{{svLicenseKey}}"
set mysql_connection_string "{{dbConnectionString}}"

# ── Server Identity ───────────────────────────────────────────────────────
sv_hostname "{{serverName}}"
sets sv_projectName "[{{recipeName}}] {{serverName}}"
sets sv_projectDesc "{{recipeDescription}}"
sets tags "racing, spicez, spz"
sets locale "root-AQ"

# ── Branding ──────────────────────────────────────────────────────────────
load_server_icon Logo.png
sets banner_detail "https://raw.githubusercontent.com/SPiceZ21/spz-txrecipe/main/Banner.png"
sets banner_connecting "https://raw.githubusercontent.com/SPiceZ21/spz-txrecipe/main/Banner.png"

# ── Slots & Build ─────────────────────────────────────────────────────────
sv_maxclients {{maxClients}}
sv_enforceGameBuild 3407
set resources_useSystemChat true

# ── SPiceZ Convars ────────────────────────────────────────────────────────
set spz_debug "{{spzDebug}}"

# ── Voice (pma-voice) ─────────────────────────────────────────────────────
setr voice_useNativeAudio true
setr voice_useSendingRangeOnly false
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3
setr voice_enableRadioAnim 1
setr voice_syncData 1

# ── CFX Default Resources ─────────────────────────────────────────────────
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure baseevents

# ── Dependencies ──────────────────────────────────────────────────────────
ensure oxmysql
ensure ox_lib
ensure pma-voice
ensure screenshot-basic

# ── SPiceZ-Core Framework ─────────────────────────────────────────────────
ensure spz-lib
ensure spz-loading
ensure spz-core
ensure spz-identity
ensure spz-appearance
ensure spz-spawn

# ── Racing Modules ────────────────────────────────────────────────────────
ensure spz-vehicles
ensure spz-physics
ensure spz-races
ensure spz-leaderboard
ensure spz-progression
ensure spz-nametag
ensure spz-poll
ensure spz-raceUI
ensure spz-carspawner
ensure spz-speedometer
ensure spz-nos

# ── Admin Tools ───────────────────────────────────────────────────────────
ensure vMenu

# ── Permissions ───────────────────────────────────────────────────────────
exec @vMenu/config/permissions.cfg
add_ace group.admin command allow
add_ace group.admin spz.admin allow
add_ace group.admin spz.moderator allow
add_ace group.admin spz.spectate allow
add_ace group.admin spz.dev allow
{{addPrincipalsMaster}}

# ── Custom Inheritance ────────────────────────────────────────────────────
# add_principal identifier.fivem:YOUR_ID group.admin
