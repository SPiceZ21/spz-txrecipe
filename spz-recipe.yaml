name: SPiceZ-Core Racing
version: "2.1.0"
author: SPiceZ-Core
description: >
  A professional high-performance racing framework for FiveM. 
  Modularized recipe for cleaner deployment.

variables:
  spzDebug: "false"
  recipeName: "SPiceZ-Core"
  recipeDescription: "Advanced Racing Framework"

tasks:
  # ── 1. Preparation ──────────────────────────────────────────────────────────
  - action: download_github
    src: https://github.com/spicez21/spz-txrecipe
    dest: ./tmp/recipe

  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]

  # ── 2. Database ───────────────────────────────────────────────────────────
  - action: connect_database
  - action: query_database
    file: ./tmp/recipe/spz-core.sql

  # ── 3. Dependencies ───────────────────────────────────────────────────────
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    path: ./tmp/oxmysql.zip
  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/[dependencies]

  - action: download_file
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip
    path: ./tmp/ox_lib.zip
  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/[dependencies]

  # pma-voice (Mumble)
  - action: download_github
    src: https://github.com/AvarianKnight/pma-voice
    dest: ./resources/[dependencies]/pma-voice

  # ── 4. SPiceZ-Core modules ────────────────────────────────────────────────
  - action: download_github
    src: https://github.com/spicez21/spz-lib
    dest: ./resources/[spz]/spz-lib
  
  - action: download_github
    src: https://github.com/spicez21/spz-core
    dest: ./resources/[spz]/spz-core

  - action: download_github
    src: https://github.com/spicez21/spz-identity
    dest: ./resources/[spz]/spz-identity

  - action: download_github
    src: https://github.com/spicez21/spz-vehicles
    dest: ./resources/[spz]/spz-vehicles

  - action: download_github
    src: https://github.com/spicez21/spz-races
    dest: ./resources/[spz]/spz-races

  - action: download_github
    src: https://github.com/spicez21/spz-progression
    dest: ./resources/[spz]/spz-progression

  - action: download_github
    src: https://github.com/spicez21/spz-hud
    dest: ./resources/[spz]/spz-hud

  # ── 5. Configuration ──────────────────────────────────────────────────────
  - action: copy_path
    src: ./tmp/recipe/Logo.png
    dest: ./Logo.png

  - action: copy_path
    src: ./tmp/recipe/Banner.png
    dest: ./Banner.png

  - action: write_file
    file: ./server.cfg
    data: |
      # ── Server Endpoints ──────────────────────────────────────────────────
      {{serverEndpoints}}

      # ── Server Identification ─────────────────────────────────────────────
      sv_hostname "{{serverName}}"
      sets sv_projectName "[{{recipeName}}] {{serverName}}"
      sets sv_projectDesc "{{recipeDescription}}"
      sets tags "racing, spicez, spz, c-pro"
      sets locale "root-AQ" 

      # ── UI/UX ─────────────────────────────────────────────────────────────
      load_server_icon Logo.png
      sets banner_detail "Banner.png"
      sets banner_connecting "Banner.png"
      sv_maxclients {{maxClients}}

      # ── Game Build ────────────────────────────────────────────────────────
      sv_enforceGameBuild 3095 
      set resources_useSystemChat true

      # ── License & Database ────────────────────────────────────────────────
      sv_licenseKey "{{svLicenseKey}}"
      set mysql_connection_string "{{dbConnectionString}}"

      # ── SPiceZ Convars ────────────────────────────────────────────────────
      set spz_debug "{{spzDebug}}"

      # ── Voice Configuration ───────────────────────────────────────────────
      setr voice_useNativeAudio true
      setr voice_useSendingRangeOnly true
      setr voice_defaultCycle "GRAVE"
      setr voice_defaultVolume 0.3
      setr voice_enableRadioAnim 1
      setr voice_syncData 1

      # ── Default CFX Resources ─────────────────────────────────────────────
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure baseevents

      # ── Dependencies ──────────────────────────────────────────────────────
      ensure oxmysql
      ensure ox_lib
      ensure pma-voice

      # ── SPiceZ-Core Framework ─────────────────────────────────────────────
      ensure spz-lib
      ensure spz-core

      # ── Racing Modules ────────────────────────────────────────────────────
      ensure spz-identity
      ensure spz-vehicles
      ensure spz-races
      ensure spz-progression
      ensure spz-hud

      # ── Permissions ───────────────────────────────────────────────────────
      add_ace group.admin command allow 
      add_ace group.admin spz.admin allow
      add_ace group.admin spz.moderator allow
      add_ace group.admin spz.spectate allow
      add_ace group.admin spz.dev allow
      {{addPrincipalsMaster}}

      # ── Inheritance ───────────────────────────────────────────────────────
      add_principal qbcore.god group.admin 

  # ── 6. Finalization ───────────────────────────────────────────────────────
  - action: remove_path
    path: ./tmp
