name: SPiceZ-Core Racing
version: "2.3.3"
author: SPiceZ21
description: >
  Open-source, modular racing framework for FiveM.
  Installs all dependencies, SPZ modules, database schema,
  and a production-ready server.cfg in one step.

variables:
  spzDebug: "false"
  recipeName: "SPiceZ-Core"
  recipeDescription: "Open-source FiveM Racing Framework"

tasks:
  # ── 1. Recipe Assets ─────────────────────────────────────────────────────────
  - action: download_github
    src: https://github.com/SPiceZ21/spz-txrecipe
    dest: ./tmp/recipe

  # ── 2. Base Server Data ───────────────────────────────────────────────────────
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]

  # ── 3. Database ───────────────────────────────────────────────────────────────
  - action: connect_database
  - action: query_database
    file: ./tmp/recipe/spz-core.sql

  # ── 4. Dependencies ───────────────────────────────────────────────────────────
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    path: ./tmp/oxmysql.zip
  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/[dependencies]

  - action: download_file
    url: https://github.com/TomGrobbe/vMenu/releases/download/v3.8.8/vMenu-3.8.8.zip
    path: ./tmp/vMenu.zip
  - action: unzip
    src: ./tmp/vMenu.zip
    dest: ./resources/vMenu

  - action: download_file
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip
    path: ./tmp/ox_lib.zip
  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/[dependencies]

  - action: download_github
    src: https://github.com/AvarianKnight/pma-voice
    dest: ./resources/[dependencies]/pma-voice

  - action: download_github
    src: https://github.com/citizenfx/screenshot-basic
    dest: ./resources/[dependencies]/screenshot-basic

  # ── 5. SPiceZ-Core Modules ────────────────────────────────────────────────────
  - action: download_github
    src: https://github.com/SPiceZ21/spz-lib
    dest: ./resources/[spz]/spz-lib

  - action: download_github
    src: https://github.com/SPiceZ21/spz-loading
    dest: ./resources/[spz]/spz-loading

  - action: download_github
    src: https://github.com/SPiceZ21/spz-core
    dest: ./resources/[spz]/spz-core

  - action: download_github
    src: https://github.com/SPiceZ21/spz-spawn
    dest: ./resources/[spz]/spz-spawn

  - action: download_github
    src: https://github.com/SPiceZ21/spz-identity
    dest: ./resources/[spz]/spz-identity

  - action: download_github
    src: https://github.com/SPiceZ21/spz-appearance
    dest: ./resources/[spz]/spz-appearance

  - action: download_github
    src: https://github.com/SPiceZ21/spz-vehicles
    dest: ./resources/[spz]/spz-vehicles

  - action: download_github
    src: https://github.com/SPiceZ21/spz-physics
    dest: ./resources/[spz]/spz-physics

  - action: download_github
    src: https://github.com/SPiceZ21/spz-races
    dest: ./resources/[spz]/spz-races

  - action: download_github
    src: https://github.com/SPiceZ21/spz-leaderboard
    dest: ./resources/[spz]/spz-leaderboard

  - action: download_github
    src: https://github.com/SPiceZ21/spz-progression
    dest: ./resources/[spz]/spz-progression

  - action: download_github
    src: https://github.com/SPiceZ21/spz-hud
    dest: ./resources/[spz]/spz-hud

  - action: download_github
    src: https://github.com/SPiceZ21/spz-poll
    dest: ./resources/[spz]/spz-poll

  - action: download_github
    src: https://github.com/SPiceZ21/spz-raceUI
    dest: ./resources/[spz]/spz-raceUI

  - action: download_github
    src: https://github.com/SPiceZ21/spz-carspawner
    dest: ./resources/[spz]/spz-carspawner


# - action: download_github
#   src: https://github.com/SPiceZ21/spz-admin
#   dest: ./resources/[spz]/spz-admin

  # ── 6. Branding Assets ────────────────────────────────────────────────────────
  - action: copy_path
    src: ./tmp/recipe/Logo.png
    dest: ./Logo.png

  - action: copy_path
    src: ./tmp/recipe/permissions.cfg
    dest: ./permissions.cfg

  - action: copy_path
    src: ./tmp/recipe/Banner.png
    dest: ./Banner.png

  # ── 7. server.cfg ─────────────────────────────────────────────────────────────
  - action: copy_path
    src: ./tmp/recipe/server.cfg
    dest: ./server.cfg

  # ── 8. Cleanup ────────────────────────────────────────────────────────────────
  - action: remove_path
    path: ./tmp
